<div id="dashboard-page" class="page" style="display: none;">
  <div class="container">
    
    <!-- Dashboard Header -->
    <div class="dashboard-header">
      <h2>Your Projects</h2>
      <button onclick="showPage('add-project')" class="btn btn-primary">
        Add New Project
      </button>
    </div>

    <!-- Projects Container -->
    <div id="projects-container" class="projects-grid">
      <!-- Projects will be loaded here -->

    <!-- No Projects Message -->
    <div id="no-projects" class="no-projects" style="display: none;">

      <p>Start by adding your first project!</p>
      <button onclick="showPage('add-project')" class="btn btn-secondary">
        Add Project
      </button>
    </div>
    
  </div>
</div>
